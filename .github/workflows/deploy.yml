name: Deploy

# Images are built on GitHub Actions runners and pushed straight to Artifact
# Registry — Cloud Build is intentionally NOT used (avoids per-build-minute
# charges). Do NOT run `gcloud run deploy --source=...` or `gcloud builds
# submit` from any local script: those silently spin up Cloud Build.
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID         - GCP project id
#   GCP_SA_KEY             - Service account JSON key with roles:
#                              roles/artifactregistry.writer
#                              roles/run.admin
#                              roles/iam.serviceAccountUser
#                              roles/compute.instanceAdmin.v1
#   DATABASE_URL           - Supabase Postgres URL (already set)
#   REDIS_URL              - Upstash Redis URL (already set)
#   API_KEY                - Shared secret required on every API request
#                            (sent as X-API-Key header)
#
# Required GitHub Variables (Settings > Variables, non-sensitive):
#   GCP_REGION             - e.g. us-central1
#   GCP_ZONE               - e.g. us-central1-a
#   AR_REPO                - Artifact Registry repository (e.g. crawler-images)
#   CLOUD_RUN_SERVICE      - Cloud Run service name (e.g. stock-market-api)
#   WORKER_VM_NAME         - Compute Engine VM name (e.g. crawler-worker-vm)
#
# One-time setup on GCP:
#   gcloud artifacts repositories create $AR_REPO \
#     --repository-format=docker --location=$GCP_REGION
#   The worker VM service account needs roles/artifactregistry.reader.
#
# Schema migrations are NOT run here — see migrations.yml, which fires only
# on changes under alembic/ or crawler/models/ to save CI minutes.
# When pushing schema + code together, migrations.yml typically finishes
# before deploy.yml's build & push completes.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/daily-sync.yml"
      - ".github/workflows/migrations.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: stock-market-crawler

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    env:
      IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler
      IMAGE_REF: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Assert image ref is fully populated
        run: |
          if [[ "$IMAGE_REF" != *-docker.pkg.dev/*/*/stock-market-crawler:* ]]; then
            echo "::error::IMAGE_REF is malformed: '$IMAGE_REF'. Check secrets/vars: GCP_REGION, GCP_PROJECT_ID, AR_REPO."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Scan image for CRITICAL / HIGH CVEs
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ${{ env.IMAGE_REF }}
      #     format: table
      #     exit-code: '1'
      #     severity: CRITICAL,HIGH
      #     ignore-unfixed: true
      #     vuln-type: os,library

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REF }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha

  deploy-api:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE_REF: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run revision
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          if [[ -z "${IMAGE_REF}" || "${IMAGE_REF}" == *":" ]]; then
            echo "::error::IMAGE_REF is empty or has no tag: '${IMAGE_REF}'"
            exit 1
          fi
          if [[ -z "${API_KEY}" ]]; then
            echo "::error::Secret API_KEY is empty — the API will refuse to start."
            exit 1
          fi
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image="${IMAGE_REF}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --update-env-vars="API_KEY=${API_KEY}" \
            --quiet

  deploy-worker:
    name: Roll Celery worker VM
    runs-on: ubuntu-latest
    needs: build-and-push
    # The worker VM is a plain Debian/Ubuntu host running Docker — NOT a
    # Container-Optimized OS (COS) container-VM. So `gcloud compute instances
    # update-container` does not apply here; we SSH in, pull, and restart.
    #
    # SA roles required (in addition to those in the file header):
    #   roles/compute.osLogin          (or project-level SSH keys configured)
    #   roles/iap.tunnelResourceAccessor   (only if the VM has no external IP)
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
      REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Roll worker container via SSH
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          set -euo pipefail

          ACCESS_TOKEN=$(gcloud auth print-access-token)

          # base64-encode secrets so they pass safely through shell args
          # (no quoting headaches even if values contain $, ', ", spaces, etc.)
          DB_B64=$(printf '%s' "$DATABASE_URL" | base64 -w0)
          REDIS_B64=$(printf '%s' "$REDIS_URL" | base64 -w0)

          gcloud compute ssh "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet \
            --command="bash -s -- $ACCESS_TOKEN $REGISTRY $IMAGE $DB_B64 $REDIS_B64" <<'REMOTE'
          set -euo pipefail

          ACCESS_TOKEN="$1"
          REGISTRY="$2"
          IMAGE="$3"
          DATABASE_URL=$(printf '%s' "$4" | base64 -d)
          REDIS_URL=$(printf '%s' "$5" | base64 -d)

          # Auth Docker to Artifact Registry with a short-lived access token
          echo "$ACCESS_TOKEN" | sudo docker login -u oauth2accesstoken --password-stdin "$REGISTRY"

          sudo docker pull "$IMAGE"

          # Stop & remove existing worker (idempotent — first run is a no-op)
          sudo docker rm -f celery-worker 2>/dev/null || true

          # Write env file with restrictive perms before populating it
          sudo install -m 600 /dev/null /etc/celery-worker.env
          printf 'DATABASE_URL=%s\nREDIS_URL=%s\n' "$DATABASE_URL" "$REDIS_URL" \
            | sudo tee /etc/celery-worker.env >/dev/null

          sudo docker run -d \
            --name celery-worker \
            --restart unless-stopped \
            --env-file /etc/celery-worker.env \
            "$IMAGE" \
            celery -A crawler.celery_app worker --loglevel=info --concurrency=2

          sudo docker image prune -f
          REMOTE

      - name: Verify worker is healthy
        run: |
          gcloud compute ssh "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet \
            --command='
              for i in $(seq 1 18); do
                if sudo docker logs --tail 200 celery-worker 2>&1 | grep -qE "ready\.|celery@"; then
                  echo "Worker ready"; exit 0
                fi
                sleep 5
              done
              echo "::error::Worker did not reach ready state"
              sudo docker logs --tail 100 celery-worker
              exit 1
            '
