name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/daily-sync.yml"
      - ".github/workflows/migrations.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: stock-market-crawler

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    env:
      IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler
      IMAGE_REF: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Assert image ref is fully populated
        run: |
          if [[ "$IMAGE_REF" != *-docker.pkg.dev/*/*/stock-market-crawler:* ]]; then
            echo "::error::IMAGE_REF is malformed: '$IMAGE_REF'. Check secrets/vars: GCP_REGION, GCP_PROJECT_ID, AR_REPO."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Scan image for CRITICAL / HIGH CVEs
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ${{ env.IMAGE_REF }}
      #     format: table
      #     exit-code: '1'
      #     severity: CRITICAL,HIGH
      #     ignore-unfixed: true
      #     vuln-type: os,library

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REF }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha

  deploy-api:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE_REF: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run revision
        run: |
          if [[ -z "${IMAGE_REF}" || "${IMAGE_REF}" == *":" ]]; then
            echo "::error::IMAGE_REF is empty or has no tag: '${IMAGE_REF}'"
            exit 1
          fi
          # OTEL_ENABLED is intentionally `false` at deploy time — flip it to
          # `true` from the Cloud Run console after the first revision lands
          # and you have verified JSON logs in Cloud Logging. Keeping it off by
          # default means a botched OTel rollout never blocks a deploy.
          # The `^@^` delimiter syntax lets us pass commas inside an env var
          # value (the FastAPI excluded-URLs list).
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image="${IMAGE_REF}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --update-env-vars="^@^LOG_FORMAT=gcp@DEPLOYMENT_ENV=production@SERVICE_VERSION=${{ github.sha }}@OTEL_ENABLED=false@OTEL_EXPORTER=gcp@OTEL_SAMPLE_RATIO=0.1@OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=/health,/docs,/redoc,/openapi.json,/" \
            --quiet

  deploy-worker:
    name: Roll Celery worker VM
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Update COS container metadata
        run: |
          # Observability envs mirror the API deploy: structured JSON logs are
          # active immediately (LOG_FORMAT=gcp) so Cloud Logging gets correct
          # severity from day one; OTel tracing is off by default and flipped
          # on per-service once the operator is comfortable with quota usage.
          gcloud compute instances update-container "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --container-image="${IMAGE}" \
            --container-env="REDIS_HOST=localhost,PYTHONPATH=/app,GCP_PROJECT=${{ secrets.GCP_PROJECT_ID }},R2_BUCKET_RI_DOCS=ri-docs,R2_BUCKET_PORTFOLIOS=portfolios,R2_RI_PUBLIC_BASE_URL=${{ vars.R2_RI_PUBLIC_BASE_URL }},LOG_FORMAT=gcp,DEPLOYMENT_ENV=production,SERVICE_VERSION=${{ github.sha }},OTEL_ENABLED=false,OTEL_EXPORTER=gcp,OTEL_SAMPLE_RATIO=0.1" \
            --container-command="/app/scripts/worker_entrypoint.sh" \
            --clear-container-args \
            --quiet

      - name: Verify worker is healthy
        run: |
          # Give COS a moment to pull and start
          sleep 30
          gcloud compute instances get-serial-port-output "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            | tail -n 200 | grep -iE "ready|celery" || echo "Worker logs not yet in serial output, checking again in 30s..."

          sleep 30
          gcloud compute instances get-serial-port-output "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            | tail -n 500 | grep -iE "ready|celery" || (echo "Worker health check timed out" && exit 1)

  deploy-ri-job:
    name: Update RI Cloud Run Job
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
      RI_JOB_NAME: lagoai-ri-crawl
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Update Cloud Run Job image
        run: |
          gcloud run jobs update "${RI_JOB_NAME}" \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --update-env-vars="LOG_FORMAT=gcp,DEPLOYMENT_ENV=production,SERVICE_VERSION=${{ github.sha }},OTEL_ENABLED=false,OTEL_EXPORTER=gcp,OTEL_SAMPLE_RATIO=0.1" \
            --quiet

      - name: Smoke-execute Job (non-blocking)
        run: |
          gcloud run jobs execute "${RI_JOB_NAME}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --async \
            --quiet
