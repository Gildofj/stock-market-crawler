name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/daily-sync.yml"
      - ".github/workflows/migrations.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: stock-market-crawler

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync

      - name: Run linter (Ruff)
        run: uv run ruff check .

      - name: Run formatter check (Ruff)
        run: uv run ruff format --check .

      - name: Run type checker (Pyright)
        run: uv run pyright

      - name: Run tests (Pytest)
        run: uv run pytest tests/ -v

  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: quality
    env:
      IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler
      IMAGE_REF: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Assert image ref is fully populated
        run: |
          if [[ "$IMAGE_REF" != *-docker.pkg.dev/*/*/stock-market-crawler:* ]]; then
            echo "::error::IMAGE_REF is malformed: '$IMAGE_REF'. Check secrets/vars: GCP_REGION, GCP_PROJECT_ID, AR_REPO."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REF }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha

  deploy-api:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE_REF: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run revision
        run: |
          if [[ -z "${IMAGE_REF}" || "${IMAGE_REF}" == *":" ]]; then
            echo "::error::IMAGE_REF is empty or has no tag: '${IMAGE_REF}'"
            exit 1
          fi
          # `^@^` delimiter lets us pass commas inside an env var value.
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image="${IMAGE_REF}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --update-env-vars="^@^LOG_FORMAT=gcp@DEPLOYMENT_ENV=production@SERVICE_VERSION=${{ github.sha }}@OTEL_ENABLED=true@OTEL_EXPORTER=gcp@OTEL_SAMPLE_RATIO=0.1@OTEL_PYTHON_FASTAPI_EXCLUDED_URLS=/health,/docs,/redoc,/openapi.json,/" \
            --quiet

  deploy-worker:
    name: Deploy Worker to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE_REF: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run worker revision
        run: |
          if [[ -z "${IMAGE_REF}" || "${IMAGE_REF}" == *":" ]]; then
            echo "::error::IMAGE_REF is empty or has no tag: '${IMAGE_REF}'"
            exit 1
          fi
          # `^@^` delimiter lets us pass commas inside an env var value.
          gcloud run deploy stock-market-worker \
            --image="${IMAGE_REF}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --update-env-vars="^@^LOG_FORMAT=gcp@DEPLOYMENT_ENV=production@SERVICE_VERSION=${{ github.sha }}@OTEL_ENABLED=true@OTEL_EXPORTER=gcp@OTEL_SAMPLE_RATIO=0.1" \
            --quiet

  deploy-ri-job:
    name: Update RI Cloud Run Job
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
      RI_JOB_NAME: lagoai-ri-crawl
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Update Cloud Run Job image
        run: |
          gcloud run jobs update "${RI_JOB_NAME}" \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --update-env-vars="LOG_FORMAT=gcp,DEPLOYMENT_ENV=production,SERVICE_VERSION=${{ github.sha }},OTEL_ENABLED=true,OTEL_EXPORTER=gcp,OTEL_SAMPLE_RATIO=0.1" \
            --quiet

      - name: Smoke-execute Job (non-blocking)
        run: |
          gcloud run jobs execute "${RI_JOB_NAME}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --async \
            --quiet

  deploy-refresh-universe-job:
    name: Update refresh-universe Cloud Run Job
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
      REFRESH_JOB_NAME: refresh-universe
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Update Cloud Run Job image
        run: |
          gcloud run jobs update "${REFRESH_JOB_NAME}" \
            --image="${IMAGE}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --update-env-vars="LOG_FORMAT=gcp,DEPLOYMENT_ENV=production,SERVICE_VERSION=${{ github.sha }},OTEL_ENABLED=true,OTEL_EXPORTER=gcp,OTEL_SAMPLE_RATIO=0.1" \
            --quiet
      # No smoke-execute: a full refresh consumes ~200-3000 Brapi calls
      # (free-tier monthly quota is 15k). The weekly Cloud Scheduler trigger
      # validates the new image at no additional cost; trigger manually with
      # `gcloud run jobs execute refresh-universe` if a deploy-time smoke is
      # needed.
