name: Deploy

# Images are built on GitHub Actions runners and pushed straight to Artifact
# Registry — Cloud Build is intentionally NOT used (avoids per-build-minute
# charges). Do NOT run `gcloud run deploy --source=...` or `gcloud builds
# submit` from any local script: those silently spin up Cloud Build.
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID         - GCP project id
#   GCP_SA_KEY             - Service account JSON key with roles:
#                              roles/artifactregistry.writer
#                              roles/run.admin
#                              roles/iam.serviceAccountUser
#                              roles/compute.instanceAdmin.v1
#   DATABASE_URL           - Supabase Postgres URL (already set)
#   REDIS_URL              - Upstash Redis URL (already set)
#
# Required GitHub Variables (Settings > Variables, non-sensitive):
#   GCP_REGION             - e.g. us-central1
#   GCP_ZONE               - e.g. us-central1-a
#   AR_REPO                - Artifact Registry repository (e.g. crawler-images)
#   CLOUD_RUN_SERVICE      - Cloud Run service name (e.g. stock-market-api)
#   WORKER_VM_NAME         - Compute Engine VM name (e.g. crawler-worker-vm)
#
# One-time setup on GCP:
#   gcloud artifacts repositories create $AR_REPO \
#     --repository-format=docker --location=$GCP_REGION
#   The worker VM service account needs roles/artifactregistry.reader.
#
# Schema migrations are NOT run here — see migrations.yml, which fires only
# on changes under alembic/ or crawler/models/ to save CI minutes.
# When pushing schema + code together, migrations.yml typically finishes
# before deploy.yml's build & push completes.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/daily-sync.yml"
      - ".github/workflows/migrations.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: stock-market-crawler

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    env:
      IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler
      IMAGE_REF: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Assert image ref is fully populated
        run: |
          if [[ "$IMAGE_REF" != *-docker.pkg.dev/*/*/stock-market-crawler:* ]]; then
            echo "::error::IMAGE_REF is malformed: '$IMAGE_REF'. Check secrets/vars: GCP_REGION, GCP_PROJECT_ID, AR_REPO."
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Scan image for CRITICAL / HIGH CVEs
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     image-ref: ${{ env.IMAGE_REF }}
      #     format: table
      #     exit-code: '1'
      #     severity: CRITICAL,HIGH
      #     ignore-unfixed: true
      #     vuln-type: os,library

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REF }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha

  deploy-api:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE_REF: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run revision
        run: |
          if [[ -z "${IMAGE_REF}" || "${IMAGE_REF}" == *":" ]]; then
            echo "::error::IMAGE_REF is empty or has no tag: '${IMAGE_REF}'"
            exit 1
          fi
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image="${IMAGE_REF}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

  deploy-worker:
    name: Roll Celery worker VM
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/stock-market-crawler:${{ github.sha }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Verify GCP Permissions
        run: |
          echo "Checking permissions for ${{ vars.WORKER_VM_NAME }}..."
          if ! gcloud compute instances describe "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" > /dev/null 2>&1; then
            echo "::error::Permission 'compute.instances.get' denied. Ensure the Service Account has 'roles/compute.admin' or 'roles/compute.instanceAdmin.v1' at the project level."
            exit 1
          fi

      - name: Update worker container
        run: |
          gcloud compute instances update-container "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --container-image="${{ env.IMAGE }}"

      - name: Verify worker logs (COS Serial Port)
        run: |
          echo "Waiting for container to start..."
          sleep 20
          # COS logs to serial port 1 by default for container start-up
          gcloud compute instances get-serial-port-output "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --port=1 | grep -iE "celery|error" || echo "Note: Serial logs not available yet or no celery logs found."
          compute ssh "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet \
            --command="sudo docker logs --tail 50 celery-worker | grep -E 'ready\\.|ERROR' || (echo 'Worker did not reach ready state'; exit 1)"
