name: Deploy to Oracle VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/migrations.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync

      - name: Run linter (Ruff)
        run: uv run ruff check .

      - name: Run formatter check (Ruff)
        run: uv run ruff format --check .

      - name: Run type checker (Pyright)
        run: uv run pyright

      - name: Run tests (Pytest)
        run: uv run pytest tests/ -v

  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          LOG_FORMAT: ${{ vars.LOG_FORMAT || 'human' }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_API_TOKEN: ${{ secrets.R2_API_TOKEN }}
          R2_BUCKET_RI_DOCS: ${{ vars.R2_BUCKET_RI_DOCS || 'ri-docs' }}
          R2_BUCKET_PORTFOLIOS: ${{ vars.R2_BUCKET_PORTFOLIOS || 'portfolios' }}
          R2_RI_PUBLIC_BASE_URL: ${{ vars.R2_RI_PUBLIC_BASE_URL }}
          CRAWLER_HTTP_PROXY: ${{ secrets.CRAWLER_HTTP_PROXY }}
          CRAWLER_HTTPS_PROXY: ${{ secrets.CRAWLER_HTTPS_PROXY }}
          OTEL_ENABLED: ${{ vars.OTEL_ENABLED || 'false' }}
          SERVICE_VERSION: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: DATABASE_URL,API_KEY,ALLOWED_ORIGINS,LOG_LEVEL,LOG_FORMAT,R2_ACCOUNT_ID,R2_API_TOKEN,R2_BUCKET_RI_DOCS,R2_BUCKET_PORTFOLIOS,R2_RI_PUBLIC_BASE_URL,CRAWLER_HTTP_PROXY,CRAWLER_HTTPS_PROXY,OTEL_ENABLED,SERVICE_VERSION
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH || '~/stock-market-crawler' }}
            git pull origin main
            export ENV="production"
            export DEPLOYMENT_ENV="production"
            export SERVICE_NAME="stock-market-crawler"
            python3 -c "import os; keys=['DATABASE_URL','API_KEY','ALLOWED_ORIGINS','ENV','DEPLOYMENT_ENV','SERVICE_NAME','SERVICE_VERSION','LOG_LEVEL','LOG_FORMAT','R2_ACCOUNT_ID','R2_API_TOKEN','R2_BUCKET_RI_DOCS','R2_BUCKET_PORTFOLIOS','R2_RI_PUBLIC_BASE_URL','CRAWLER_HTTP_PROXY','CRAWLER_HTTPS_PROXY','OTEL_ENABLED']; f=open('.env','w'); [f.write(k+'='+os.environ.get(k,'')+'\n') for k in keys]; f.close()"
            docker logout ghcr.io || true
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f

