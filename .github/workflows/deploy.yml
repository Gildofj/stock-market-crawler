name: Deploy

# Images are built on GitHub Actions runners and pushed straight to Artifact
# Registry — Cloud Build is intentionally NOT used (avoids per-build-minute
# charges). Do NOT run `gcloud run deploy --source=...` or `gcloud builds
# submit` from any local script: those silently spin up Cloud Build.
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID         - GCP project id
#   GCP_SA_KEY             - Service account JSON key with roles:
#                              roles/artifactregistry.writer
#                              roles/run.admin
#                              roles/iam.serviceAccountUser
#                              roles/compute.instanceAdmin.v1
#   DATABASE_URL           - Supabase Postgres URL (already set)
#   REDIS_URL              - Upstash Redis URL (already set)
#
# Required GitHub Variables (Settings > Variables, non-sensitive):
#   GCP_REGION             - e.g. us-central1
#   GCP_ZONE               - e.g. us-central1-a
#   AR_REPO                - Artifact Registry repository (e.g. crawler-images)
#   CLOUD_RUN_SERVICE      - Cloud Run service name (e.g. stock-market-api)
#   WORKER_VM_NAME         - Compute Engine VM name (e.g. crawler-worker-vm)
#
# One-time setup on GCP:
#   gcloud artifacts repositories create $AR_REPO \
#     --repository-format=docker --location=$GCP_REGION
#   The worker VM service account needs roles/artifactregistry.reader.
#
# Schema migrations are NOT run here — see migrations.yml, which fires only
# on changes under alembic/ or crawler/models/ to save CI minutes.
# When pushing schema + code together, migrations.yml typically finishes
# before deploy.yml's build & push completes.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/daily-sync.yml'
      - '.github/workflows/migrations.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: stock-market-crawler

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - id: meta
        name: Compute image tag
        run: |
          BASE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/${IMAGE_NAME}"
          SHA="${GITHUB_SHA::7}"
          echo "image=${BASE}:${SHA}" >> "$GITHUB_OUTPUT"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.base }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for CRITICAL / HIGH CVEs
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.base }}:${{ steps.meta.outputs.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.base }}:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.base }}:latest
          cache-from: type=gha

  deploy-api:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run revision
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --image="${{ needs.build-and-push.outputs.image }}" \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

  deploy-worker:
    name: Roll Celery worker VM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Restart container with new image
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          REGISTRY_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          TOKEN=$(gcloud auth print-access-token)

          REMOTE_CMD=$(cat <<EOF
          set -euo pipefail
          echo "${TOKEN}" | sudo docker login -u oauth2accesstoken --password-stdin ${REGISTRY_HOST}
          sudo docker pull ${IMAGE}
          sudo docker rm -f celery-worker 2>/dev/null || true
          sudo docker run -d \\
            --name celery-worker \\
            --restart always \\
            -e DATABASE_URL='${DATABASE_URL}' \\
            -e REDIS_URL='${REDIS_URL}' \\
            -e PYTHONPATH=/app \\
            ${IMAGE} \\
            celery -A crawler.celery_app worker --loglevel=info --concurrency=2
          sudo docker image prune -f
          EOF
          )

          gcloud compute ssh "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet \
            --command="${REMOTE_CMD}"

      - name: Verify worker is consuming
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          sleep 15
          gcloud compute ssh "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet \
            --command="sudo docker logs --tail 50 celery-worker | grep -E 'ready\\.|ERROR' || (echo 'Worker did not reach ready state'; exit 1)"
