name: Bootstrap Worker VM

# One-time setup for the Celery worker VM. Run this once after creating the
# VM, before deploy.yml will succeed. Idempotent — safe to re-run after a
# tear-down or if a step partially failed.
#
# What this does:
#   1. Turns on OS Login at the instance level (so the SA can SSH).
#   2. Installs Docker via the distro package (docker.io).
#   3. Enables the daemon at boot.
#   4. Sanity-checks `docker pull`.
#
# Manual prerequisites BEFORE running this:
#   - The VM `${WORKER_VM_NAME}` exists in `${GCP_ZONE}`.
#   - The service account in `GCP_SA_KEY` has:
#       roles/compute.osAdminLogin   (root via OS Login, needed for sudo apt)
#       roles/iam.serviceAccountUser on the VM's attached service account
#       roles/iap.tunnelResourceAccessor   (only if the VM has no external IP —
#         then also add --tunnel-through-iap to every ssh call below)
#   - The VM's *own* service account has roles/artifactregistry.reader so
#     `docker pull` can fetch images from Artifact Registry at deploy time.

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Install Docker & enable OS Login
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Enable OS Login on the instance
        run: |
          gcloud compute instances add-metadata "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --metadata=enable-oslogin=TRUE

      - name: Install Docker on the VM
        run: |
          set -euo pipefail
          gcloud compute ssh "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet \
            --command="bash -s" <<'REMOTE'
          set -euo pipefail

          if command -v docker >/dev/null 2>&1; then
            echo "Docker already installed: $(docker --version)"
          else
            # docker.io from the distro repo is sufficient for a single-host
            # worker — no need to add the upstream docker-ce repo.
            sudo apt-get update -y
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
              docker.io ca-certificates
          fi

          sudo systemctl enable --now docker
          sudo docker info >/dev/null
          echo "Docker daemon healthy: $(docker --version)"
          REMOTE

      - name: Sanity check — pull a tiny image
        run: |
          gcloud compute ssh "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --quiet \
            --command="sudo docker pull hello-world >/dev/null && echo 'Docker can pull images.'"
