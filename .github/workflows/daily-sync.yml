name: Daily Market Crawler (Enqueuer)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  enqueue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Fetch secrets from Secret Manager
        run: |
          DATABASE_URL=$(gcloud secrets versions access latest \
            --secret=database-url --project="${{ secrets.GCP_PROJECT_ID }}")
          echo "::add-mask::$DATABASE_URL"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"

      - name: Resolve Cloud Run Worker URL
        run: |
          URL=$(gcloud run services describe stock-market-worker \
            --region="${{ vars.GCP_REGION }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(status.url)")
          echo "CLOUD_RUN_URL=$URL" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Enqueue Tasks (Cloud Tasks)
        run: uv run python scripts/enqueue_daily_jobs.py
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          PYTHONPATH: .
          LOG_LEVEL: INFO
