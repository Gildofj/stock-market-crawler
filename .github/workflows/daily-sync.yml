name: Daily Market Crawler (Enqueuer)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  enqueue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve worker VM public IP
        id: vm
        run: |
          IP=$(gcloud compute instances describe "${{ vars.WORKER_VM_NAME }}" \
            --zone="${{ vars.GCP_ZONE }}" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
          if [[ -z "$IP" ]]; then
            echo "::error::Could not resolve worker VM public IP"
            exit 1
          fi
          echo "ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Fetch secrets from Secret Manager
        run: |
          REDIS_PASSWORD=$(gcloud secrets versions access latest \
            --secret=redis-password --project="${{ secrets.GCP_PROJECT_ID }}")
          DATABASE_URL=$(gcloud secrets versions access latest \
            --secret=database-url --project="${{ secrets.GCP_PROJECT_ID }}")
          echo "::add-mask::$REDIS_PASSWORD"
          echo "::add-mask::$DATABASE_URL"
          echo "REDIS_PASSWORD=$REDIS_PASSWORD" >> "$GITHUB_ENV"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Enqueue Tasks (Celery)
        run: uv run python scripts/enqueue_daily_jobs.py
        env:
          REDIS_URL: redis://:${{ env.REDIS_PASSWORD }}@${{ steps.vm.outputs.ip }}:6379/0
          PYTHONPATH: .
          LOG_LEVEL: INFO
