name: Daily Market Crawler

on:
  schedule:
    - cron: '0 2 * * *' # Runs at 02:00 UTC daily
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Dispatcher (main.py)
        run: uv run python main.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CELERY_BROKER_URL: ${{ secrets.CELERY_BROKER_URL }}
          LOG_LEVEL: INFO

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Wake up Fly.io Worker
        run: |
          # Lista IDs de máquinas no grupo 'worker' e inicia cada uma.
          # Se não houver máquinas, escala para 1.
          MACHINE_IDS=$(flyctl machines list --json | jq -r '.[] | select(.config.process_group == "worker") | .id')
          if [ -n "$MACHINE_IDS" ]; then
            for id in $MACHINE_IDS; do
              flyctl machine start $id
            done
          else
            flyctl scale count worker=1 --yes
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
