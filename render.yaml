services:
  # API Service (FastAPI)
  - type: web
    name: stock-market-api
    runtime: docker
    plan: free # No credit card required, but will sleep after 15m
    region: ohio
    dockerContext: .
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set this manually in the Render Dashboard with your Supabase URL
      - key: REDIS_URL
        value: redis://localhost:6379/0 # Optional: Update to an external Redis if needed
