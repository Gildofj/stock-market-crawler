services:
  db:
    image: postgres:17-alpine
    container_name: stock_market_crawler_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: stock_market_crawler_data
      POSTGRES_USER: crawler_user
      POSTGRES_PASSWORD: crawler_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler_user -d stock_market_crawler_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana-oss:latest
    container_name: stock_market_crawler_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: stock_market_crawler_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:latest
    container_name: stock_market_crawler_loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./grafana/loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    container_name: stock_market_crawler_promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./grafana/promtail/config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  api:
    build: .
    container_name: stock_market_crawler_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://crawler_user:crawler_pass@db:5432/stock_market_crawler_data
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - ENV=development
      - LOG_FORMAT=human
      - DEPLOYMENT_ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Hot worker: high-cadence queues + embedded beat scheduler.
  # Beat is intentionally only on this process (Celery requires a single scheduler).
  worker-hot:
    build: .
    container_name: stock_market_crawler_worker_hot
    command: celery -A crawler.celery_app worker --beat --loglevel=info --concurrency=2 -Q crawler,default,macro -n hot@%h
    environment:
      - DATABASE_URL=postgresql://crawler_user:crawler_pass@db:5432/stock_market_crawler_data
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - LOG_FORMAT=human
      - DEPLOYMENT_ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Lake worker: lighter parser workloads (RSS news). RI is NOT consumed here —
  # it runs as a Cloud Run Job in production (see terraform/cloud_run_job.tf).
  worker-lake:
    build: .
    container_name: stock_market_crawler_worker_lake
    command: celery -A crawler.celery_app worker --loglevel=info --concurrency=1 -Q lake -n lake@%h
    environment:
      - DATABASE_URL=postgresql://crawler_user:crawler_pass@db:5432/stock_market_crawler_data
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - LOG_FORMAT=human
      - DEPLOYMENT_ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
