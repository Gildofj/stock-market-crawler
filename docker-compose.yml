services:
  db:
    image: postgres:17-alpine
    container_name: stock_market_crawler_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: stock_market_crawler_data
      POSTGRES_USER: crawler_user
      POSTGRES_PASSWORD: crawler_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler_user -d stock_market_crawler_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana-oss:latest
    container_name: stock_market_crawler_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: stock_market_crawler_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:latest
    container_name: stock_market_crawler_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./grafana/loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    container_name: stock_market_crawler_promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./grafana/promtail/config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  api:
    build: .
    container_name: stock_market_crawler_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://crawler_user:crawler_pass@db:5432/stock_market_crawler_data
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    container_name: stock_market_crawler_worker
    # Use -c 10 for 10 concurrent processes to speed up crawling
    command: celery -A crawler.celery_app worker --loglevel=info -c 10 --prefetch-multiplier 1
    environment:
      - DATABASE_URL=postgresql://crawler_user:crawler_pass@db:5432/stock_market_crawler_data
      - CELERY_BROKER_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      - db
      - redis
    restart: unless-stopped

  flower:
    build: .
    container_name: stock_market_crawler_flower
    command: celery -A crawler.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      - redis
      - worker
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
