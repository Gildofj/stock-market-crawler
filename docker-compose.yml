services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: stock_market_crawler_timescaledb
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: stock_market_crawler_data
      POSTGRES_USER: crawler_user
      POSTGRES_PASSWORD: crawler_pass
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      # Run initial migration on first start
      - ./crawler/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler_user -d stock_market_crawler_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana-oss:latest
    container_name: stock_market_crawler_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      timescaledb:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: stock_market_crawler_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: stock_market_crawler_worker
    command: celery -A crawler.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://crawler_user:crawler_pass@timescaledb:5432/stock_market_crawler_data
      - CELERY_BROKER_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      - timescaledb
      - redis
    restart: unless-stopped

volumes:
  timescaledb_data:
    driver: local
  grafana_data:
    driver: local
