services:
  redis:
    image: redis:7-alpine
    container_name: stock_market_crawler_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock_market_crawler_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - WORKER_API_URL=http://worker:8000
      - OTEL_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      ofelia.enabled: "true"
      # Enqueue daily ticker crawls at 02:00:00 UTC every day
      ofelia.job-exec.daily-sync.schedule: "0 0 2 * * *"
      ofelia.job-exec.daily-sync.command: "python -m scripts.runbooks.enqueue_daily_jobs"
      # Enqueue LagoAI news and RI filings crawls at 05:00:00 UTC every day
      ofelia.job-exec.lake-sync.schedule: "0 0 5 * * *"
      ofelia.job-exec.lake-sync.command: "python -m scripts.runbooks.enqueue_lake_jobs"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.stealth
    container_name: stock_market_crawler_worker
    command: sh -c "python -m scripts.worker_dispatcher & uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4"
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - WORKER_API_URL=http://127.0.0.1:8000
      - OTEL_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    image: mcuadros/ofelia:latest
    container_name: stock_market_crawler_scheduler
    restart: unless-stopped
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - api
      - worker

  # --- OBSERVABILITY PROFILE SERVICES (DISABLED BY DEFAULT FOR RESOURCE ECONOMY) ---
  grafana:
    image: grafana/grafana-oss:latest
    container_name: stock_market_crawler_grafana
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  loki:
    image: grafana/loki:latest
    container_name: stock_market_crawler_loki
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./grafana/loki/local-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki

  promtail:
    image: grafana/promtail:latest
    container_name: stock_market_crawler_promtail
    restart: unless-stopped
    profiles:
      - observability
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./grafana/promtail/config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.10.5
    container_name: stock_market_crawler_tempo
    restart: unless-stopped
    profiles:
      - observability
    command: -config.file=/etc/tempo/tempo.yaml
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4317:4317"
    volumes:
      - ./grafana/tempo/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo_data:/var/tempo

volumes:
  redis_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local
