# fly.toml app configuration file generated for stock-market-crawler on 2026-05-09T19:11:42-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stock-market-crawler'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENV = 'production'
  LOG_LEVEL = 'INFO'
  PYTHONPATH = '/app'

[processes]
  web = 'uvicorn api.main:app --host 0.0.0.0 --port 8080 --proxy-headers --forwarded-allow-ips="*"'
  worker = 'celery -A crawler.celery_app worker --loglevel=info -c 4 --prefetch-multiplier 1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['web']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
