# fly.toml app configuration file generated for stock-market-crawler-worker on 2026-05-09T11:47:35-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stock-market-crawler-worker'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  LOG_LEVEL = 'INFO'
  PYTHONPATH = '/app'
  ENV = 'production'

[processes]
  worker = 'celery -A crawler.celery_app worker --loglevel=info -c 4 --prefetch-multiplier 1'
  web = 'uvicorn api.main:app --host 0.0.0.0 --port 8080 --proxy-headers --forwarded-allow-ips="*"'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["web"]

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
