apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    url: timescaledb:5432
    database: stock_market_crawler_data
    user: crawler_user
    secureJsonData:
      password: crawler_pass
    jsonData:
      sslmode: 'disable'
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy
    isDefault: false
    editable: true

  - name: Tempo
    type: tempo
    url: http://tempo:3200
    access: proxy
    isDefault: false
    editable: true
    jsonData:
      # Lets Grafana jump from a Loki log line (with trace_id in extra) directly
      # into the matching Tempo trace via the "View trace" data-link button.
      tracesToLogsV2:
        datasourceUid: loki
        tags: [{ key: 'service.name', value: 'service' }]
        spanStartTimeShift: '-1m'
        spanEndTimeShift: '1m'
